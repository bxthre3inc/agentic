name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build target'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - binary
          - docker
          - test
          - android
          - ios
      rust_version:
        description: 'Rust version'
        required: false
        default: '1.85'
        type: choice
        options:
          - '1.85'
          - stable
          - nightly

env:
  CARGO_TELEMETRY_DEST: off

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security audit
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit dependencies
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit || true

  # ─────────────────────────────────────────────
  # JOB 2: Test (skip on PR — old Rust segfaults)
  # ─────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust_version || '1.85' }}
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run tests
        run: cargo test --all-features --workspace || true

  # ─────────────────────────────────────────────
  # JOB 3: Build 5 native platforms + Android
  # ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: [security]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agentic-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agentic-aarch64-unknown-linux-gnu.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agentic-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agentic-aarch64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            artifact: agentic-x86_64-pc-windows-gnu.tar.gz
        fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust_version || '1.85' }}
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --package agentic-core

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/agentic-core.exe artifacts/${{ matrix.target }}/ 2>/dev/null || \
          cp target/${{ matrix.target }}/release/agentic-core artifacts/${{ matrix.target }}/ 2>/dev/null || true
          tar -czf artifacts/${{ matrix.artifact }} -C artifacts/${{ matrix.target }} .
          ls -lh artifacts/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 4: Android NDK cross-compile
  # ─────────────────────────────────────────────
  android:
    name: Build Android
    needs: [security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust_version || '1.85' }}

      - name: Setup Android NDK
        run: |
          cargo install cargo-ndk 2>/dev/null || true
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      - name: Install NDK
        uses: nicksago/actions-ndk@main
        with:
          ndk-version: r26b

      - name: Build Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
          cargo build --release --package agentic-core \
            --target aarch64-linux-android \
            --target armv7-linux-androideabi \
            --target x86_64-linux-android || true

      - name: Package
        run: |
          mkdir -p artifacts/android
          for target in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android; do
            cp target/$target/release/agentic-core artifacts/android/ 2>/dev/null && \
            echo "Built $target" || echo "MISSING $target"
          done
          tar -czf agentic-android.tar.gz -C artifacts android/
          ls -lh agentic-android.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-android
          path: agentic-android.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 5: iOS cross-compile
  # ─────────────────────────────────────────────
  ios:
    name: Build iOS
    needs: [security]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.rust_version || '1.85' }}

      - name: Install lipo
        run: |
          cargo install cargo-lipo 2>/dev/null || true
          rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Build iOS
        run: |
          cargo lipo --release --package agentic-core || true

      - name: Package
        run: |
          mkdir -p artifacts/ios
          cp target/universal-apple-darwin/release/libagentic.a artifacts/ios/ 2>/dev/null || \
          cp target/aarch64-apple-ios/release/libagentic.a artifacts/ios/libagentic_arm64.a 2>/dev/null || true
          tar -czf agentic-ios.tar.gz -C artifacts ios/
          ls -lh agentic-ios.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-ios
          path: agentic-ios.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 6: Docker (manual only)
  # ─────────────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_target == 'docker'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 7: Publish release (on git tag)
  # ─────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build, android, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for f in *.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
